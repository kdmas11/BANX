<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BANX | Live Inventory 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F8FAFC; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .tab-btn.active { color: #4338CA; border-bottom: 2px solid #4338CA; }
        .product-card { transition: transform 0.2s; }
        .product-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="p-6">

    <header class="max-w-6xl mx-auto mb-12 flex justify-between items-center">
        <h1 class="text-3xl font-black uppercase tracking-tighter">Banx<span class="text-indigo-600">.</span></h1>
        <div class="px-4 py-1 bg-indigo-100 text-indigo-700 rounded-full text-[10px] font-bold uppercase">2026 Live Stock</div>
    </header>

    <div class="flex justify-center space-x-8 mb-12 border-b border-slate-200">
        <button class="tab-btn pb-4 font-bold text-sm uppercase tracking-widest text-slate-400" onclick="openTab(event, 'lighting')">Lighting</button>
        <button class="tab-btn pb-4 font-bold text-sm uppercase tracking-widest text-slate-400" onclick="openTab(event, 'kitchen')">Kitchen & Juicers</button>
    </div>

    <main class="max-w-6xl mx-auto">
        
        <div id="lighting" class="tab-content">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="product-card bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                    <img src="https://ashoppervillage.com/wp-content/uploads/2024/09/COB-RECHARGEABLE-KEYCHAIN-LIGHT.jpg" class="w-full aspect-square object-contain mb-4 rounded-xl">
                    <h3 class="font-bold text-lg mb-2">COB Keychain Light</h3>
                    <div class="flex items-center justify-between">
                        <span class="text-2xl font-black">₹53</span>
                        <span class="text-[10px] line-through text-slate-400">MRP ₹150</span>
                    </div>
                </div>
                <div class="product-card bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                    <img src="https://ashoppervillage.com/wp-content/uploads/2025/01/3D-MOON-LAMP.jpg" class="w-full aspect-square object-contain mb-4 rounded-xl">
                    <h3 class="font-bold text-lg mb-2">3D Moon Lamp</h3>
                    <div class="flex items-center justify-between">
                        <span class="text-2xl font-black">₹215</span>
                        <span class="text-[10px] line-through text-slate-400">MRP ₹450</span>
                    </div>
                </div>
                <div class="product-card bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                    <img src="https://ashoppervillage.com/wp-content/uploads/2024/09/61JeHh037UL._SL1000_.jpg" class="w-full aspect-square object-contain mb-4 rounded-xl">
                    <h3 class="font-bold text-lg mb-2">Solar Wall Lamp</h3>
                    <div class="flex items-center justify-between">
                        <span class="text-2xl font-black">₹106</span>
                        <span class="text-[10px] line-through text-slate-400">MRP ₹250</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="kitchen" class="tab-content">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="product-card bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                    <img src="https://ashoppervillage.com/wp-content/uploads/2024/09/71Q2Smvs1RL._SL1500_.jpg" class="w-full aspect-square object-contain mb-4 rounded-xl">
                    <h3 class="font-bold text-lg mb-2">6 Blade USB Juicer</h3>
                    <div class="flex items-center justify-between">
                        <span class="text-2xl font-black">₹175</span>
                        <span class="text-[10px] line-through text-slate-400">MRP ₹350</span>
                    </div>
                </div>
                <div class="product-card bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                    <img src="https://ashoppervillage.com/wp-content/uploads/2025/01/612IgimUC3L._SL1085_.jpg" class="w-full aspect-square object-contain mb-4 rounded-xl">
                    <h3 class="font-bold text-lg mb-2">Nima Electric Grinder</h3>
                    <div class="flex items-center justify-between">
                        <span class="text-2xl font-black">₹230</span>
                        <span class="text-[10px] line-through text-slate-400">MRP ₹500</span>
                    </div>
                </div>
                <div class="product-card bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                    <img src="https://ashoppervillage.com/wp-content/uploads/2024/09/51DJMxyQx5L._SX569_.jpg" class="w-full aspect-square object-contain mb-4 rounded-xl">
                    <h3 class="font-bold text-lg mb-2">Mini Bottle Juicer</h3>
                    <div class="flex items-center justify-between">
                        <span class="text-2xl font-black">₹148</span>
                        <span class="text-[10px] line-through text-slate-400">MRP ₹300</span>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        function openTab(evt, tabName) {
            var i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tab-content");
            for (i = 0; i < tabcontent.length; i++) tabcontent[i].classList.remove("active");
            tablinks = document.getElementsByClassName("tab-btn");
            for (i = 0; i < tablinks.length; i++) tablinks[i].classList.remove("active");
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }
        // Auto-open first tab
        document.querySelector('.tab-btn').click();
    </script>
</body>
</html>
